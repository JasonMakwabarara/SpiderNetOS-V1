services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: spidernet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: php artisan serve --host=0.0.0.0 --port=8000
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: php artisan queue:work redis --tries=3 --timeout=120
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy

  reverb:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      BROADCAST_CONNECTION: reverb
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_HOST: localhost
      REVERB_PORT: 8080
      REVERB_SCHEME: http
    depends_on:
      redis:
        condition: service_healthy

  cockpit:
    image: node:20-alpine
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    working_dir: /app
    volumes:
      - ./cockpit:/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api

volumes:
  pgdata:
