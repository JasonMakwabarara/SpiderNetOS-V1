server {
    listen 80;
    server_name spidernetos.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name spidernetos.com;

    ssl_certificate /etc/letsencrypt/live/spidernetos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spidernetos.com/privkey.pem;

    root /var/www/spidernet-final/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}